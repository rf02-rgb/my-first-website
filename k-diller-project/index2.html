<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 字体（高级感） -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- 图标 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
  <title>K-Diller</title>
</head>

<body>

<!-- NAV -->
<header class="navbar">
  <i class="fa-solid fa-bars"></i>
  <div class="logo">K-DILLER</div>
  <div class="nav-icons">
    <i class="fa-regular fa-heart"></i>
    <i class="fa-regular fa-user"></i>
    <i class="fa-solid fa-bag-shopping"></i>
  </div>
</header>

<!-- SEARCH -->
<div class="search-wrapper">
  <input type="text" placeholder="What are you looking for?">
  <i class="fa-solid fa-search"></i>
</div>

<!-- HERO -->
<section class="hero">
  <img src="images/hero.jpg">
  <div class="overlay"></div>
  <h2>Shop All</h2>
</section>

<!-- CATEGORY -->
<section class="categories">

  <div class="category">
    <img src="images/womens.jpg">
    <div class="overlay"></div>
    <h3>Womenswear</h3>
  </div>

  <div class="category">
    <img src="images/mens.jpg">
    <div class="overlay"></div>
    <h3>Menswear</h3>
  </div>

</section>

<!-- STORY -->
<section class="story">
  <img src="images/story.jpg">
  <div class="overlay"></div>

  <div class="story-text">
    <h2>Our Story</h2>
    <p>
      Founded in 2013 and inspired by the evolution of global streetwear, 
      K-Diller channels bold attitude, Y2K aesthetics, and underground culture into every piece.
    </p>
  </div>
</section>

</body>
</html>
